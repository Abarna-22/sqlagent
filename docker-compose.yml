version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sqlagent_db}
      MYSQL_USER: ${MYSQL_USER:-sqlagent_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sqlagent_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      timeout: 5s
      retries: 5
      interval: 10s

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_USER=${MYSQL_USER:-sqlagent_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-sqlagent_pass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-sqlagent_db}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db

volumes:
  mysql_data:
  chroma_data:
